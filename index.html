<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Road Trip Weather</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
			crossorigin="anonymous" />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
		<link rel="stylesheet" href="./Assets/CSS/reset.css" />
		<link rel="stylesheet" href="./Assets/CSS/styles.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet" />
	</head>
	<body class="m-3 d-flex align-items-center flex-column">
		<nav
			class="d-flex justify-content-center align-items-center gap-2 w-100 w-xl-50 mb-5"
			aria-label="Main navigation">
			<i
				class="bi bi-sun-fill"
				style="font-size: 3rem; color: orange"></i>
			<p class="fs-4 fw-bold">Your Weather</p>
		</nav>
		<main class="w- 100 w-xl-75">
			<form class="mb-3 d-flex flex-column align-items-center">
				<label
					for="city-search"
					id="city-search-label"
					class="form-label"
					>Search for city</label
				>
				<input
					type="text"
					class="form-control rounded-pill"
					name="city-search"
					id="city-search"
					aria-labelledby="city-search-label"
					aria-describedby="helpId"
					title="City name"
					placeholder="City name..." />
				<button
					type="submit"
					class="btn-primary rounded-pill mt-1"
					id="search-button">
					Search
				</button>
			</form>

			<p class="fs-3 fw-bold text-center">Recent Searches</p>
			<div
				class="d-flex w-50 gap-2 justify-content-center p-3 mb-4"
				id="recentSearches"></div>

			<div id="currentWeather"></div>

			<div id="forecastWeather"></div>
		</main>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
			crossorigin="anonymous"></script>
		<script src="./Assets/JS/index.js"></script>
	</body>
</html>
